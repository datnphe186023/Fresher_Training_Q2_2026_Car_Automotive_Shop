# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/mockfpt
spring.datasource.username=postgres
spring.datasource.password=abc123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-minimum-256-bits
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# Logging Configuration
logging.level.com.carshop=DEBUG
logging.level.org.springframework.security=DEBUG
