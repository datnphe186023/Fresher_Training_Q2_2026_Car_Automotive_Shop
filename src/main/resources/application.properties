# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/mockfpt?serverTimezone=UTC
spring.datasource.username=postgres
spring.datasource.password=abc123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-minimum-256-bits
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# Logging Configuration
logging.level.com.carshop=DEBUG
logging.level.org.springframework.security=DEBUG

# Week 5 - scheduled jobs
jobs.scheduler.enabled=true
jobs.daily-sales-summary.cron=0 15 0 * * *
jobs.overdue-invoices.cron=0 0 1 * * *
jobs.low-stock-scan.cron=0 30 1 * * *
jobs.appointment-reminder.cron=0 0 */6 * * *
